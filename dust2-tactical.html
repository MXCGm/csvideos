<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dustⅡ 道具 · 战术面板 (独立版)</title>
    <style>

@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@800;900&family=Noto+Sans+SC:wght@900&family=Share+Tech+Mono&display=swap');

*,::before,::after{margin:0;padding:0;box-sizing:border-box}

:root{
 --bg-deep: #14140e;
 --bg-panel: rgba(196,176,140,0.06);
 --bg-card: rgba(28,26,20,0.9);
 --tactical-orange: #f0a050;
 --tactical-orange-dim: rgba(240,160,80,0.15);
 --text-primary: #e0ddd4;
 --text-dim: #8a8578;
 --border-subtle: rgba(196,176,140,0.15);
 --border-active: rgba(240,160,80,0.6);
 --danger-red: #c0392b;
 --font-title: 'Saira Condensed', sans-serif;
 --font-title-cn: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
 --font-mono: 'Share Tech Mono', 'Courier New', monospace;
 --gap: 12px;
 --card-size: 240px;
}

body{
 background: var(--bg-deep);
 color: var(--text-primary);
 font-family: var(--font-mono);
 min-height: 100vh;
 overflow-x: hidden;
 -webkit-font-smoothing: antialiased;
}

body::before{
 content: '';
 position: fixed;
 top: 0;left: 0;right: 0;height: 2px;
 background: rgba(240,160,80,0.08);
 animation: scanline 8s linear infinite;
 pointer-events: none;
 z-index: 9999;
}
@keyframes scanline{ 0%{top:0%} 100%{top:100%} }

body::after{
 content: '';
 position: fixed;
 inset: 0;
 background-image:
 linear-gradient(rgba(196,176,140,0.08) 1px, transparent 1px),
 linear-gradient(90deg, rgba(196,176,140,0.08) 1px, transparent 1px);
 background-size: 40px 40px;
 pointer-events: none;
 z-index: 0;
}

.bg-tactical{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}

.grenade-smoke{position:absolute;left:2%;top:8%;width:170px;height:240px;opacity:0.055;}
.grenade-smoke::before{content:'';position:absolute;left:24px;top:48px;width:122px;height:156px;border:2px solid rgba(196,176,140,1);border-radius:18px 18px 26px 26px;background:rgba(196,176,140,0.05);}
.grenade-smoke::after{content:'';position:absolute;left:66px;top:0;width:38px;height:56px;border:2px solid rgba(196,176,140,1);border-bottom:none;border-radius:19px 19px 0 0;}
.grenade-smoke .g-line{position:absolute;left:26px;width:118px;height:1px;background:rgba(196,176,140,1);}

.grenade-flash{position:absolute;right:6%;top:14%;width:130px;height:240px;opacity:0.05;transform:rotate(10deg);}
.grenade-flash::before{content:'';position:absolute;left:32px;top:34px;width:66px;height:166px;border:2px solid rgba(240,160,80,1);border-radius:13px 13px 20px 20px;background:rgba(240,160,80,0.04);}
.grenade-flash::after{content:'';position:absolute;left:45px;top:0;width:40px;height:42px;border:2px solid rgba(240,160,80,1);border-bottom:none;border-radius:8px 8px 0 0;}

.grenade-he{position:absolute;right:3%;bottom:6%;width:200px;height:200px;opacity:0.05;}
.grenade-he::before{content:'';position:absolute;left:32px;top:32px;width:136px;height:136px;border:2px solid rgba(240,160,80,1);border-radius:50%;background:repeating-linear-gradient(0deg,transparent,transparent 14px,rgba(240,160,80,0.3) 14px,rgba(240,160,80,0.3) 15px),repeating-linear-gradient(90deg,transparent,transparent 14px,rgba(240,160,80,0.3) 14px,rgba(240,160,80,0.3) 15px);}
.grenade-he::after{content:'';position:absolute;left:86px;top:0;width:28px;height:42px;border:2px solid rgba(240,160,80,1);border-bottom:none;border-radius:7px 7px 0 0;}

.grenade-molly{position:absolute;left:2%;bottom:4%;width:190px;height:230px;opacity:0.05;transform:rotate(-12deg);}
.grenade-molly::before{content:'';position:absolute;left:42px;top:42px;width:106px;height:140px;border:2px solid rgba(196,176,140,1);border-radius:26px 26px 44px 44px;background:rgba(196,176,140,0.04);}
.grenade-molly::after{content:'';position:absolute;left:72px;top:4px;width:46px;height:48px;border:2px solid rgba(196,176,140,1);border-bottom:none;border-radius:8px 8px 0 0;}
.grenade-molly .m-flame{position:absolute;left:76px;top:-22px;width:38px;height:30px;border:1.5px solid rgba(240,160,80,1);border-radius:50%;opacity:0.7;}

.map-a-long{position:absolute;left:10%;top:22%;width:220px;height:50px;border:1.5px solid rgba(196,176,140,0.14);border-radius:2px;opacity:0.7;transform:rotate(-5deg);}
.map-a-site{position:absolute;left:24%;top:32%;width:85px;height:85px;border:1.5px solid rgba(196,176,140,0.15);background:rgba(240,160,80,0.03);transform:rotate(3deg);}
.map-a-site::after{content:'A';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-3deg);font-family:var(--font-title);font-size:28px;color:rgba(240,160,80,0.13);}
.map-a-short{position:absolute;left:30%;top:36%;width:120px;height:36px;border:1.5px solid rgba(196,176,140,0.12);transform:rotate(24deg);opacity:0.6;}
.map-mid{position:absolute;left:44%;top:28%;width:90px;height:180px;border:1.5px solid rgba(196,176,140,0.12);border-radius:4px;opacity:0.65;}
.map-mid::before{content:'';position:absolute;left:50%;top:36%;transform:translate(-50%,-50%);width:26px;height:26px;border:1.5px solid rgba(240,160,80,0.14);border-radius:50%;}
.map-b-tuns{position:absolute;right:12%;top:42%;width:50px;height:160px;border:1.5px solid rgba(196,176,140,0.13);opacity:0.7;}
.map-b-tuns::before{content:'';position:absolute;inset:7px;border-left:1px dashed rgba(196,176,140,0.1);border-right:1px dashed rgba(196,176,140,0.1);}
.map-b-site{position:absolute;right:8%;bottom:16%;width:80px;height:80px;border:1.5px solid rgba(196,176,140,0.15);background:rgba(240,160,80,0.025);}
.map-b-site::after{content:'B';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-title);font-size:26px;color:rgba(240,160,80,0.13);}
.map-ct-spawn{position:absolute;left:5%;bottom:10%;width:120px;height:44px;border:1.5px dashed rgba(196,176,140,0.11);opacity:0.65;}
.map-t-spawn{position:absolute;right:4%;bottom:3%;width:105px;height:40px;border:1.5px dashed rgba(196,176,140,0.11);opacity:0.65;}
.map-ct-mid{position:absolute;left:12%;bottom:22%;width:170px;height:34px;border:1.5px solid rgba(196,176,140,0.09);transform:rotate(3deg);opacity:0.5;}

.tac-arrow-1{position:absolute;left:8%;bottom:14%;width:180px;height:1.5px;background:repeating-linear-gradient(90deg,rgba(240,160,80,0.22) 0px,rgba(240,160,80,0.22) 12px,transparent 12px,transparent 20px);transform:rotate(-35deg);transform-origin:left center;}
.tac-arrow-1::after{content:'\25B6';position:absolute;right:-5px;top:-4px;font-size:9px;color:rgba(240,160,80,0.2);}
.tac-arrow-2{position:absolute;left:30%;top:38%;width:120px;height:1.5px;background:repeating-linear-gradient(90deg,rgba(196,176,140,0.18) 0px,rgba(196,176,140,0.18) 10px,transparent 10px,transparent 16px);transform:rotate(5deg);transform-origin:left center;}
.tac-arrow-2::after{content:'\25B6';position:absolute;right:-4px;top:-4px;font-size:8px;color:rgba(196,176,140,0.18);}
.tac-arrow-3{position:absolute;right:14%;bottom:7%;width:80px;height:1.5px;background:repeating-linear-gradient(90deg,rgba(240,160,80,0.18) 0px,rgba(240,160,80,0.18) 10px,transparent 10px,transparent 16px);transform:rotate(-48deg);transform-origin:left center;}
.tac-arrow-3::after{content:'\25B6';position:absolute;right:-4px;top:-4px;font-size:8px;color:rgba(240,160,80,0.18);}
.tac-arrow-4{position:absolute;left:48%;bottom:22%;width:160px;height:1.5px;background:repeating-linear-gradient(90deg,rgba(196,176,140,0.16) 0px,rgba(196,176,140,0.16) 10px,transparent 10px,transparent 16px);transform:rotate(12deg);transform-origin:left center;}
.tac-arrow-4::after{content:'\25B6';position:absolute;right:-4px;top:-4px;font-size:8px;color:rgba(196,176,140,0.16);}

.tac-circle-1{position:absolute;left:12%;top:26%;width:42px;height:42px;border:1.5px dashed rgba(240,160,80,0.18);border-radius:50%;}
.tac-circle-1::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:rgba(240,160,80,0.18);}
.tac-circle-2{position:absolute;left:44%;top:42%;width:36px;height:36px;border:1.5px dashed rgba(196,176,140,0.14);border-radius:50%;}
.tac-circle-2::after{content:'\2295';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(196,176,140,0.14);}
.tac-circle-3{position:absolute;right:10%;bottom:14%;width:30px;height:30px;border:1.5px dashed rgba(240,160,80,0.14);border-radius:50%;}

.tac-crosshair{position:absolute;left:46%;top:30%;width:20px;height:20px;opacity:0.52;}
.tac-crosshair::before,.tac-crosshair::after{content:'';position:absolute;background:rgba(240,160,80,0.18);}
.tac-crosshair::before{left:50%;top:0;width:1.5px;height:100%;transform:translateX(-50%);}
.tac-crosshair::after{left:0;top:50%;width:100%;height:1.5px;transform:translateY(-50%);}

.tac-dist-a{position:absolute;left:14%;top:30%;width:100px;height:16px;border-top:1.5px dotted rgba(196,176,140,0.12);transform:rotate(-6deg);}
.tac-dist-a::after{content:'~120m';position:absolute;right:-16px;top:-7px;font-family:var(--font-mono);font-size:7px;color:rgba(196,176,140,0.22);letter-spacing:1px;}
.tac-dist-b{position:absolute;right:12%;bottom:20%;width:60px;height:16px;border-top:1.5px dotted rgba(196,176,140,0.12);}
.tac-dist-b::after{content:'~80m';position:absolute;right:-12px;top:-7px;font-family:var(--font-mono);font-size:7px;color:rgba(196,176,140,0.22);letter-spacing:1px;}

.tac-label{position:absolute;font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:rgba(196,176,140,0.24);text-transform:uppercase;}
.tac-label.a-long{left:11.5%;top:21%;}.tac-label.a-short{left:32%;top:34.5%;}
.tac-label.mid{left:45%;top:27%;}.tac-label.b-tuns{right:13%;top:41%;}
.tac-label.ct{left:6%;bottom:9%;}.tac-label.t{right:5%;bottom:2%;}

.admin-badge{display:none;font-size:22px;cursor:pointer;position:relative;top:-2px;opacity:0.7;transition:opacity 0.2s;user-select:none;}
.admin-badge:hover{opacity:1;}.admin-badge.visible{display:inline;}

.exit-admin-btn{display:none;position:fixed;bottom:20px;left:20px;z-index:20001;background:rgba(28,26,20,0.85);border:1px solid var(--border-subtle);color:var(--text-dim);padding:6px 14px;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;transition:all 0.2s;}
.exit-admin-btn:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);}
.exit-admin-btn.visible{display:block;}

.app-container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:28px 32px 40px;}

.header{display:flex;align-items:flex-end;gap:20px;margin-bottom:32px;flex-wrap:wrap;}
.title-block{line-height:0.95;}
.title-label{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--tactical-orange);text-transform:uppercase;margin-bottom:2px;}
.title-main{font-family:var(--font-title);font-weight:900;font-size:72px;letter-spacing:-1px;color:var(--text-primary);text-transform:uppercase;display:flex;align-items:baseline;gap:12px;}
.title-main .dust2 span{color:var(--tactical-orange);}
.title-main .title-cn{font-family:var(--font-title-cn);font-weight:900;font-size:36px;letter-spacing:2px;color:var(--text-dim);text-transform:none;position:relative;top:-4px;}
.title-coords{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-top:4px;padding-left:2px;border-left:2px solid var(--tactical-orange);padding:2px 0 2px 8px;}

.global-actions{margin-left:auto;display:flex;gap:10px;align-self:flex-end;flex-wrap:wrap;}
.btn-global{background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim);padding:8px 16px;cursor:pointer;font-family:var(--font-mono);font-size:12px;letter-spacing:1px;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.btn-global:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);background:var(--tactical-orange-dim);}
.btn-global.admin-only{display:none;}.btn-global.admin-only.visible{display:inline-block;}

.toolbar-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.search-wrap{position:relative;flex-shrink:0;}
.search-input{background:transparent;border:1px solid var(--border-subtle);padding:9px 14px 9px 34px;color:var(--text-primary);font-family:var(--font-mono);font-size:13px;letter-spacing:1px;width:220px;outline:none;transition:all 0.25s;}
.search-input::placeholder{color:var(--text-dim);opacity:0.6;}
.search-input:focus{border-color:var(--tactical-orange);width:280px;background:rgba(20,20,14,0.5);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;transition:color 0.25s;}
.search-input:focus~.search-icon,.search-wrap:focus-within .search-icon{color:var(--tactical-orange);}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;display:none;padding:2px 4px;transition:color 0.2s;}
.search-clear:hover{color:var(--danger-red)}.search-clear.visible{display:block}

.category-bar-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border-subtle);padding-bottom:10px;flex:1;min-width:0;}
.category-tab{position:relative;display:flex;align-items:center;gap:6px;padding:8px 16px;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;font-family:var(--font-mono);font-size:13px;letter-spacing:1px;transition:all 0.25s;white-space:nowrap;user-select:none;}
.category-tab:hover{color:var(--text-primary);background:var(--bg-panel);border-color:var(--border-subtle);}
.category-tab.active{color:var(--tactical-orange);background:var(--tactical-orange-dim);border-color:var(--border-active);}
.category-tab.active::after{content:'';position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:var(--tactical-orange);border-radius:50%;}
.cat-actions-inline{display:flex;gap:2px;margin-left:4px;opacity:0;transition:opacity 0.2s;}
.cat-actions-inline.admin-only{display:none;}.cat-actions-inline.admin-only.visible{display:flex;}
.category-tab:hover .cat-actions-inline.visible,.category-tab.active .cat-actions-inline.visible{opacity:1;}
.cat-btn-mini{width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim);cursor:pointer;font-size:11px;line-height:1;border-radius:2px;transition:all 0.2s;}
.cat-btn-mini:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);}
.cat-btn-mini.danger:hover{border-color:var(--danger-red);color:var(--danger-red);}

.category-add{padding:8px 14px;background:transparent;border:1px dashed var(--border-subtle);color:var(--text-dim);cursor:pointer;font-family:var(--font-mono);font-size:18px;line-height:1;transition:all 0.2s;min-width:38px;text-align:center;flex-shrink:0;}
.category-add:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);background:var(--tactical-orange-dim);}
.category-add.admin-only{display:none;}.category-add.admin-only.visible{display:inline-block;}

.content-area{min-height:400px;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-dim);border:1px dashed var(--border-subtle);text-align:center;}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-state p{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;}

.search-result-info{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:12px;padding-left:2px;}
.search-result-info strong{color:var(--tactical-orange)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-size),1fr));gap:var(--gap);align-items:start;}

.card{position:relative;aspect-ratio:1/1;background:var(--bg-card);border:1px solid var(--border-subtle);overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.25s,box-shadow 0.25s;cursor:default;}
.card:hover{border-color:var(--tactical-orange);box-shadow:inset 0 0 40px rgba(240,160,80,0.05),0 0 20px rgba(240,160,80,0.08);}
.card::before{content:'';position:absolute;top:6px;right:6px;width:8px;height:8px;border-top:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);pointer-events:none;opacity:0.6;z-index:2;}
.card:hover::before{border-color:var(--tactical-orange);}

.card-text-area{position:relative;z-index:2;padding:10px 12px;background:rgba(20,20,14,0.85);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.card-text-input{flex:1;background:transparent;border:none;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;letter-spacing:1px;outline:none;min-width:0;}
.card-text-input::placeholder{color:var(--text-dim);opacity:0.5;}
.card-text-input:focus{border-bottom:1px solid var(--tactical-orange);}
.card-text-input.readonly{cursor:default;pointer-events:none;}

.card-btn-row{display:flex;gap:2px;flex-shrink:0;}
.card-btn-row.admin-only{display:none;}.card-btn-row.admin-only.visible{display:flex;}
.card-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim);cursor:pointer;font-size:10px;border-radius:2px;transition:all 0.2s;}
.card-btn:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);}
.card-btn.danger:hover{border-color:var(--danger-red);color:var(--danger-red);}
.card-btn.cover-edit{font-size:11px;}

.card-video-area{flex:1;position:relative;background:#0a0a06;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;}
.card-video-area video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;}

.cover-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer;transition:opacity 0.2s;}
.cover-canvas:hover{opacity:0.85;}

.video-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--tactical-orange);letter-spacing:1px;animation:pulse 1s ease-in-out infinite;background:#0a0a06;}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

.video-placeholder-add{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;text-align:center;padding:12px;cursor:pointer;transition:color 0.2s,border-color 0.2s;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px dashed transparent;}
.video-placeholder-add:hover{color:var(--tactical-orange);border-color:var(--border-subtle);}
.video-placeholder-add .play-icon{display:block;font-size:40px;margin-bottom:8px;opacity:0.35;transition:opacity 0.2s,transform 0.2s;}
.video-placeholder-add:hover .play-icon{opacity:0.7;transform:scale(1.1);}

.modal-overlay{position:fixed;inset:0;background:rgba(10,10,6,0.85);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease-out;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--bg-card);border:1px solid var(--border-active);padding:28px;width:440px;max-width:90vw;position:relative;}
.modal-box h3{font-family:var(--font-title);font-weight:900;font-size:28px;letter-spacing:1px;color:var(--tactical-orange);margin-bottom:20px;text-transform:uppercase;}
.modal-box label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;}
.modal-box input{width:100%;background:rgba(20,20,14,0.6);border:1px solid var(--border-subtle);padding:10px 12px;color:var(--text-primary);font-family:var(--font-mono);font-size:13px;margin-bottom:16px;outline:none;transition:border-color 0.2s;}
.modal-box input:focus{border-color:var(--tactical-orange);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.modal-actions button{padding:10px 20px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-primary);cursor:pointer;font-family:var(--font-mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
.modal-actions button:hover{border-color:var(--tactical-orange);color:var(--tactical-orange);}
.modal-actions button.confirm{border-color:var(--tactical-orange);background:var(--tactical-orange-dim);color:var(--tactical-orange);}

<script>
/*** 注意：所有函数现在暴露在全局作用域，支持 HTML 中的 onclick 调用 ***/
'use strict';

// ========== 管理模式 ==========
var urlParams = new URLSearchParams(window.location.search);
var isAdmin = urlParams.get('p') === '0721';

// ========== 数据模型 ==========
var STORAGE_KEY = 'dust2_tactical_data_v5';
var appData = loadData();
var activeCategoryId = null;
var searchQuery = '';
var activeVideoCardId = null;

function getDefaultData(){
 return {
 categories: [
 { id: genId(), name: 'CT' },
 { id: genId(), name: 'T' },
 { id: genId(), name: 'CT 套路' }
 ],
 items: {}
 };
}

function genId(){ return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }

function loadData(){
 try{ var raw = localStorage.getItem(STORAGE_KEY); if(raw){ var d=JSON.parse(raw); if(d.categories&&d.items) return d; } }catch(e){}
 try{ var old=localStorage.getItem('dust2_tactical_data_v4'); if(old){ var d=JSON.parse(old); if(d.categories&&d.items) return d; } }catch(e){}
 try{ var old2=localStorage.getItem('dust2_tactical_data_v3'); if(old2){ var d=JSON.parse(old2); if(d.categories&&d.items) return d; } }catch(e){}
 try{ var old3=localStorage.getItem('dust2_tactical_data_v2'); if(old3){ var d=JSON.parse(old3); if(d.categories&&d.items) return d; } }catch(e){}
 try{ var old4=localStorage.getItem('dust2_tactical_data'); if(old4){ var d=JSON.parse(old4); if(d.categories&&d.items) return d; } }catch(e){}
 return getDefaultData();
}

function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

// ========== Canvas 封面生成 ==========
function generateCoverCanvas(coverText){
 var canvas = document.getElementById('hiddenCoverCanvas');
 var ctx = canvas.getContext('2d');
 var size = canvas.width;
 var ch = size / 2;
 var m = 14;

 ctx.fillStyle = '#14140e';
 ctx.fillRect(0, 0, size, size);

 ctx.strokeStyle = 'rgba(196,176,140,0.08)';
 ctx.lineWidth = 0.5;
 for(var x=20;x<size;x+=20){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,size); ctx.stroke(); }
 for(var y=20;y<size;y+=20){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(size,y); ctx.stroke(); }

 ctx.strokeStyle = 'rgba(196,176,140,0.25)';
 ctx.lineWidth = 1;
 var l = 22;
 var corners = [[m,m,'tr'],[size-m,m,'tl'],[m,size-m,'br'],[size-m,size-m,'bl']];
 corners.forEach(function(c){
 var cx=c[0], cy=c[1], dir=c[2];
 var dx1=0,dy1=0,dx2=0,dy2=0;
 if(dir==='tr'){ dx1=l;dy1=0;dx2=0;dy2=l; }
 if(dir==='tl'){ dx1=-l;dy1=0;dx2=0;dy2=l; }
 if(dir==='br'){ dx1=l;dy1=0;dx2=0;dy2=-l; }
 if(dir==='bl'){ dx1=-l;dy1=0;dx2=0;dy2=-l; }
 ctx.beginPath();
 ctx.moveTo(cx,cy); ctx.lineTo(cx+dx1,cy+dy1);
 ctx.moveTo(cx,cy); ctx.lineTo(cx+dx2,cy+dy2);
 ctx.stroke();
 });

 ctx.strokeStyle = 'rgba(240,160,80,0.2)';
 ctx.lineWidth = 0.8;
 ctx.beginPath();
 ctx.moveTo(ch-28,ch); ctx.lineTo(ch+28,ch);
 ctx.moveTo(ch,ch-28); ctx.lineTo(ch,ch+28);
 ctx.stroke();
 ctx.beginPath(); ctx.arc(ch,ch,6,0,Math.PI*2);
 ctx.strokeStyle = 'rgba(240,160,80,0.25)';
 ctx.stroke();

 ctx.strokeStyle = 'rgba(240,160,80,0.18)';
 ctx.lineWidth = 1;
 ctx.beginPath(); ctx.moveTo(m+10,size-m-10); ctx.lineTo(size-m-10,size-m-10); ctx.stroke();
 ctx.fillStyle = 'rgba(240,160,80,0.3)';
 ctx.beginPath(); ctx.arc(size-m-10,size-m-10,2.5,0,Math.PI*2); ctx.fill();

 // 随机小X号
 var seed = coverText ? coverText.length * 7 + coverText.charCodeAt(0) : 42;
 var rng = seed;
 function pseudoRandom(){ rng = (rng * 16807 + 0) % 2147483647; return (rng - 1) / 2147483646; }
 var xCount = 18 + Math.floor(pseudoRandom() * 12);
 for(var i=0;i<xCount;i++){
  var rx = 30 + pseudoRandom() * (size - 60);
  var ry = 30 + pseudoRandom() * (size - 60);
  if(Math.abs(rx - ch) < 70 && Math.abs(ry - ch) < 50) continue;
  var isOrange = pseudoRandom() > 0.4;
  var alpha = (0.2 + pseudoRandom() * 0.25).toFixed(2);
  var fs = 10 + Math.floor(pseudoRandom() * 8);
  var color = isOrange ? 'rgba(240,160,80,'+alpha+')' : 'rgba(255,255,255,'+alpha+')';
  ctx.font = fs + 'px "Share Tech Mono", monospace';
  ctx.fillStyle = color;
  ctx.strokeStyle = isOrange ? 'rgba(240,160,80,0.4)' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeText('×', rx, ry);
  ctx.fillText('×', rx, ry);
 }

 var displayText = (coverText && coverText.trim()) ? coverText.trim().toUpperCase() : '';
 if(displayText){
 var hasCJK = /[\u4e00-\u9fff]/.test(displayText);
 var fontSize;
 if(displayText.length <= 4) fontSize = 64;
 else if(displayText.length <= 8) fontSize = 44;
 else if(displayText.length <= 14) fontSize = 30;
 else fontSize = 22;

 var fontFamily = hasCJK ? '"Noto Sans SC", "Microsoft YaHei", sans-serif' : '"Saira Condensed", sans-serif';
 ctx.font = '900 ' + fontSize + 'px ' + fontFamily;
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';

 var maxWidth = size - 60;
 var lines = [displayText];
 if(ctx.measureText(displayText).width > maxWidth && displayText.length > 8){
 var mid = Math.ceil(displayText.length / 2);
 var splitIdx = mid;
 for(var i=mid;i<displayText.length;i++){ if(displayText[i]===' '){ splitIdx=i; break; } }
 if(splitIdx===mid){ for(var i=mid;i>=0;i--){ if(displayText[i]===' '){ splitIdx=i; break; } } }
 lines = [displayText.slice(0,splitIdx).trim(), displayText.slice(splitIdx).trim()];
 if(ctx.measureText(lines[0]).width > maxWidth || ctx.measureText(lines[1]).width > maxWidth){
 fontSize = Math.max(18, fontSize - 8);
 ctx.font = '900 ' + fontSize + 'px ' + fontFamily;
 }
 }

 var lineH = fontSize * 1.25;
 var totalH = lineH * lines.length;
 var startY = ch - totalH/2 + lineH/2;

 var grad = ctx.createLinearGradient(ch, startY - lineH/2, ch, startY + (lines.length-1)*lineH + lineH/2);
 grad.addColorStop(0, '#fff8e0');
 grad.addColorStop(0.35, '#f0a050');
 grad.addColorStop(0.7, '#a05020');
 grad.addColorStop(1, '#181008');

 ctx.shadowColor = 'rgba(240,160,80,0.5)';
 ctx.shadowBlur = 30;
 ctx.fillStyle = grad;
 for(var li=0;li<lines.length;li++){ ctx.fillText(lines[li], ch, startY+li*lineH); }

 ctx.shadowColor = 'rgba(255,200,120,0.75)';
 ctx.shadowBlur = 10;
 for(var li=0;li<lines.length;li++){ ctx.fillText(lines[li], ch, startY+li*lineH); }

 ctx.shadowColor = 'transparent';
 ctx.shadowBlur = 0;

 ctx.strokeStyle = 'rgba(196,176,140,0.5)';
 ctx.lineWidth = 2.5;
 ctx.lineJoin = 'round';
 for(var li=0;li<lines.length;li++){ ctx.strokeText(lines[li], ch, startY+li*lineH); }

 ctx.fillStyle = grad;
 for(var li=0;li<lines.length;li++){ ctx.fillText(lines[li], ch, startY+li*lineH); }
 }

 return canvas.toDataURL('image/jpeg', 0.92);
}

// ========== 管理员功能 ==========
function manualSave(){
 if(!isAdmin) return;
 try{ saveData(); toast('数据已保存到本地'); }catch(e){ toast('保存失败：' + e.message); }
}

function downloadHTML(){
    if(!isAdmin) return;
    try{
        saveData();

        // 1. 获取当前页面的所有样式并合并
        var styles = document.querySelectorAll('style');
        var styleContent = '';
        for (var i = 0; i < styles.length; i++) {
            styleContent += styles[i].innerHTML;
        }

        var htmlContent = document.documentElement.outerHTML;

        // 2. 提取页面 body 内的“静态”结构（不含动态生成的卡片）
        var bodyStart = htmlContent.indexOf('<body>');
        var bodyEnd = htmlContent.lastIndexOf('</body>');
        var bodySkeleton = htmlContent.substring(bodyStart + 6, bodyEnd);

        // 3. 构建一个干净的、不含任何动态内容的独立 HTML
        var dataJSON = JSON.stringify(appData);
        var encodedData = encodeURIComponent(dataJSON);

        var independentHTML = 
            '<!DOCTYPE html>\n' +
            '<html lang="zh-CN">\n' +
            '<head>\n' +
            '    <meta charset="UTF-8">\n' +
            '    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">\n' +
            '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
            '    <title>dustⅡ 道具 · 战术面板 (独立版)</title>\n' +
            '    <style>\n' + styleContent + '\n    </style>\n' +   // 这里改为 styleContent，合并所有样式
            '</head>\n' +
            '<body>\n' + // 这里开始插入 body 内容
            bodySkeleton + // 关键：这里要把提取的骨架拼回去，否则按钮消失
            // 注入数据恢复脚本（放在 body 最后）
            '\n    <script>\n' +
            '        (function(){\n' +
            '            var ENCODED_DATA = "' + encodedData + '";\n' +
            '            var EMBEDDED_DATA = JSON.parse(decodeURIComponent(ENCODED_DATA));\n' +
            '            var STORAGE_KEY = "' + STORAGE_KEY + '";\n' +
            '            // 如果本地没有数据，则写入嵌入数据\n' +
            '            if(!localStorage.getItem(STORAGE_KEY)){\n' +
            '                localStorage.setItem(STORAGE_KEY, JSON.stringify(EMBEDDED_DATA));\n' +
            '            }\n' +
            '            // 覆盖 loadData 函数，优先使用嵌入数据\n' +
            '            var _origLoadData = loadData;\n' +
            '            loadData = function(){\n' +
            '                var d = _origLoadData();\n' +
            '                if(!d.categories || d.categories.length === 0){\n' +
            '                    return JSON.parse(JSON.stringify(EMBEDDED_DATA));\n' +
            '                }\n' +
            '                return d;\n' +
            '            };\n' +
            '            // 触发重新渲染\n' +
            '            if(typeof renderAll === "function"){ renderAll(); }\n' +
            '            if(typeof applyAdminMode === "function"){ applyAdminMode(); }\n' +
            '        })();\n' +
            '    <\/script>\n' +
            '</body>\n' +
            '</html>';

        // 4. 添加 BOM 并下载
        var bom = '\uFEFF';
        var blob = new Blob([bom + independentHTML], {type: 'text/html;charset=utf-8'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'dust2-tactical-standalone.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        toast('独立 HTML 已下载');
    }catch(e){
        toast('下载失败：' + e.message);
        console.error(e);
    }
}
function applyAdminMode(){
 document.getElementById('adminBadge').classList.toggle('visible', isAdmin);
 document.getElementById('exitAdminBtn').classList.toggle('visible', isAdmin);
 var els = document.querySelectorAll('.admin-only');
 for(var i=0;i<els.length;i++){ els[i].classList.toggle('visible', isAdmin); }
 renderCategoryBar();
 renderContent();
}

function exitAdmin(){
 window.location.href = window.location.origin + window.location.pathname;
}

// ========== 搜索 ==========
function onSearch(value){
 searchQuery = value.trim().toLowerCase();
 document.getElementById('searchClear').classList.toggle('visible', !!searchQuery);
 renderContent();
}

function clearSearch(){
 document.getElementById('searchInput').value = '';
 searchQuery = '';
 document.getElementById('searchClear').classList.remove('visible');
 renderContent();
}

function getFilteredItems(){
 if(!searchQuery) return null;
 var results = [];
 for(var i=0;i<appData.categories.length;i++){
 var cat = appData.categories[i];
 var items = appData.items[cat.id] || [];
 for(var j=0;j<items.length;j++){
 var item = items[j];
 if((item.text||'').toLowerCase().indexOf(searchQuery) !== -1){
 results.push({ id: item.id, text: item.text, coverText: item.coverText, videoUrl: item.videoUrl, _catName: cat.name, catId: cat.id });
 }
 }
 }
 return results;
}

// ========== 视频 ==========
function stopActiveVideo(){
 if(!activeVideoCardId) return;
 var prevCard = document.querySelector('.card[data-item-id="' + activeVideoCardId + '"]');
 if(prevCard){
 var va = prevCard.querySelector('.card-video-area');
 if(va){
 var v = va.querySelector('video');
 if(v){ v.pause(); v.remove(); }
 restoreCover(activeVideoCardId, va);
 }
 }
 activeVideoCardId = null;
}

function restoreCover(itemId, videoArea){
 var item = findItem(itemId);
 var coverText = item ? (item.coverText || '') : '';
 var canvasImg = document.createElement('img');
 canvasImg.src = generateCoverCanvas(coverText);
 canvasImg.className = 'cover-canvas';
 canvasImg.onclick = function(e){ e.stopPropagation(); loadVideo(itemId); };
 videoArea.innerHTML = '';
 videoArea.appendChild(canvasImg);
}

function findItem(itemId){
 var catIds = Object.keys(appData.items);
 for(var i=0;i<catIds.length;i++){
 var items = appData.items[catIds[i]];
 for(var j=0;j<items.length;j++){
 if(items[j].id===itemId) return items[j];
 }
 }
 return null;
}

function loadVideo(itemId){
 if(activeVideoCardId === itemId) return;
 stopActiveVideo();
 var item = findItem(itemId);
 if(!item||!item.videoUrl||item.videoUrl.trim()===''){ toast('未设置视频链接'); return; }
 var card = document.querySelector('.card[data-item-id="' + itemId + '"]');
 if(!card) return;
 var videoArea = card.querySelector('.card-video-area');
 if(!videoArea) return;
 videoArea.innerHTML = '<div class="video-loading">LOADING...</div>';
 var ytMatch = item.videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9-]+)/);
 if(ytMatch){
 var thumbUrl = 'https://img.youtube.com/vi/' + ytMatch[1] + '/hqdefault.jpg';
 videoArea.innerHTML = '<div style="position:relative;width:100%;height:100%;cursor:pointer;" onclick="window.open(\'https://www.youtube.com/watch?v=' + ytMatch[1] + '\',\'_blank\')" title="在 YouTube 打开"><img src="' + thumbUrl + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<div class=video-placeholder-add><span class=play-icon>⚠</span>缩略图加载失败</div>\'"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);"><span style="font-size:40px;opacity:0.7;">▶</span></div></div>';
 activeVideoCardId = null;
 return;
 }
 var video = document.createElement('video');
 video.src = item.videoUrl;
 video.controls = true;
 video.playsInline = true;
 video.preload = 'auto';
 video.onloadeddata = function(){
 videoArea.innerHTML = '';
 videoArea.appendChild(video);
 video.play().catch(function(){});
 activeVideoCardId = itemId;
 };
 video.onerror = function(){
 restoreCover(itemId, videoArea);
 toast('视频加载失败');
 activeVideoCardId = null;
 };
 video.addEventListener('ended', function(){
 restoreCover(itemId, videoArea);
 activeVideoCardId = null;
 });
 videoArea.innerHTML = '';
 videoArea.appendChild(video);
 activeVideoCardId = itemId;
}

// ========== 渲染 ==========
function renderAll(){ renderCategoryBar(); renderContent(); }

function renderCategoryBar(){
 var bar = document.getElementById('categoryBar');
 var html = '';
 for(var i=0;i<appData.categories.length;i++){
 var cat = appData.categories[i];
 var isActive = cat.id === activeCategoryId && !searchQuery;
 html += '<div class="category-tab' + (isActive?' active':'') + '" data-cat-id="' + cat.id + '" onclick="switchCategory(\'' + cat.id + '\')"><span class="cat-name">' + escapeHtml(cat.name) + '</span><span class="cat-actions-inline admin-only' + (isAdmin?' visible':'') + '"><button class="cat-btn-mini" onclick="event.stopPropagation();renameCategory(\'' + cat.id + '\')" title="重命名">✎</button><button class="cat-btn-mini danger" onclick="event.stopPropagation();deleteCategory(\'' + cat.id + '\')" title="删除">×</button></span></div>';
 }
 html += '<button class="category-add admin-only' + (isAdmin?' visible':'') + '" onclick="addCategory()" title="添加分类">+</button>';
 bar.innerHTML = html;
}

function renderContent(){
 stopActiveVideo();
 var area = document.getElementById('contentArea');
 if(searchQuery){
 var results = getFilteredItems();
 if(results.length === 0){
 area.innerHTML = '<div class="empty-state"><span class="empty-icon">⌕</span><p>未找到匹配「' + escapeHtml(searchQuery) + '」的道具</p></div>';
 }else{
 var cardsHtml = '';
 for(var i=0;i<results.length;i++){ cardsHtml += renderCard(results[i], true); }
 area.innerHTML = '<div class="search-result-info">搜索「<strong>' + escapeHtml(searchQuery) + '</strong>」· 找到 <strong>' + results.length + '</strong> 个结果</div><div class="cards-grid">' + cardsHtml + '</div>';
 }
 return;
 }
 if(!activeCategoryId){
 if(appData.categories.length > 0){ activeCategoryId = appData.categories[0].id; renderAll(); return; }
 area.innerHTML = '<div class="empty-state"><span class="empty-icon">☐</span><p>未创建分类 · 点击上方 [+] 添加</p></div>';
 return;
 }
 var items = appData.items[activeCategoryId] || [];
 if(items.length === 0){
 area.innerHTML = '<div class="empty-state"><span class="empty-icon">▸</span><p>此分类下暂无道具 · ' + (isAdmin?'点击下方按钮添加':'等待管理员添加') + '</p></div>';
 }else{
 var cardsHtml = '';
 for(var i=0;i<items.length;i++){ cardsHtml += renderCard(items[i], false); }
 area.innerHTML = '<div class="cards-grid">' + cardsHtml + '</div>';
 }
 if(isAdmin){
 var addBtn = document.createElement('button');
 addBtn.className = 'btn-global';
 addBtn.style.cssText = 'margin-top:16px;width:100%;text-align:center;';
 addBtn.textContent = '+ 添加道具';
 addBtn.onclick = function(){ addItem(activeCategoryId); };
 area.appendChild(addBtn);
 }
}

function renderCard(item, showCategory){
 var hasVideo = item.videoUrl && item.videoUrl.trim() !== '';
 var coverText = item.coverText || '';

 var videoInner = '';
 if(hasVideo){
 var coverSrc = generateCoverCanvas(coverText);
 videoInner = '<img src="' + coverSrc + '" class="cover-canvas" onclick="event.stopPropagation();loadVideo(\'' + item.id + '\')" alt="封面">';
 }else{
 videoInner = '<div class="video-placeholder-add" onclick="event.stopPropagation();' + (isAdmin?('editVideoUrl(\'' + item.id + '\')'):'') + '"><span class="play-icon">▶</span>' + (isAdmin?'点击添加视频链接':'暂无视频') + '</div>';
 }

 var catBadge = showCategory ? '<span style="font-size:9px;color:var(--tactical-orange);opacity:0.7;margin-left:auto;flex-shrink:0;">' + escapeHtml(item._catName||'') + '</span>' : '';
 var inputClass = isAdmin ? '' : ' readonly';
 var coverEditBtn = isAdmin ? '<button class="card-btn cover-edit" onclick="event.stopPropagation();editCoverText(\'' + item.id + '\')" title="编辑封面文字">🖻</button>' : '';

 return '<div class="card" data-item-id="' + item.id + '"><div class="card-text-area"><input class="card-text-input' + inputClass + '" value="' + escapeAttr(item.text||'') + '" placeholder="道具名称..." onchange="' + (isAdmin?('updateItemText(\'' + item.id + '\', this.value)'):'') + '" onclick="event.stopPropagation()" ' + (isAdmin?'':'readonly') + '>' + catBadge + '<div class="card-btn-row admin-only' + (isAdmin?' visible':'') + '">' + coverEditBtn + '<button class="card-btn" onclick="event.stopPropagation();editVideoUrl(\'' + item.id + '\')" title="编辑视频">▶</button><button class="card-btn danger" onclick="event.stopPropagation();deleteItem(\'' + item.id + '\')" title="删除">×</button></div></div><div class="card-video-area">' + videoInner + '</div></div>';
}

// ========== 封面文字编辑 ==========
function editCoverText(itemId){
 if(!isAdmin) return;
 var item = findItem(itemId);
 if(!item) return;
 var currentText = item.coverText || '';
 var newText = prompt('编辑封面文字（独立于标题）：', currentText);
 if(newText === null) return;
 item.coverText = newText.trim();
 saveData();
 renderContent();
 toast('封面文字已更新');
}

// ========== 分类操作 ==========
function switchCategory(catId){
 searchQuery = '';
 document.getElementById('searchInput').value = '';
 document.getElementById('searchClear').classList.remove('visible');
 activeCategoryId = catId;
 renderAll();
}

function addCategory(){
 if(!isAdmin) return;
 var name = prompt('输入分类名称：');
 if(!name||!name.trim()) return;
 var newCat = { id: genId(), name: name.trim() };
 appData.categories.push(newCat);
 appData.items[newCat.id] = [];
 activeCategoryId = newCat.id;
 saveData(); renderAll(); toast('分类已添加');
}

function renameCategory(catId){
 if(!isAdmin) return;
 var cat = null;
 for(var i=0;i<appData.categories.length;i++){ if(appData.categories[i].id===catId){ cat=appData.categories[i]; break; } }
 if(!cat) return;
 var newName = prompt('重命名分类：', cat.name);
 if(newName&&newName.trim()!==''){ cat.name = newName.trim(); saveData(); renderAll(); toast('已重命名'); }
}

function deleteCategory(catId){
 if(!isAdmin) return;
 var cat = null;
 for(var i=0;i<appData.categories.length;i++){ if(appData.categories[i].id===catId){ cat=appData.categories[i]; break; } }
 if(!cat) return;
 if(!confirm('确定删除分类「' + cat.name + '」及其所有道具？此操作不可恢复。')) return;
 appData.categories = appData.categories.filter(function(c){ return c.id!==catId; });
 delete appData.items[catId];
 if(activeCategoryId===catId) activeCategoryId = appData.categories.length > 0 ? appData.categories[0].id : null;
 saveData(); renderAll(); toast('分类已删除');
}

// ========== 道具操作 ==========
function addItem(catId){
 if(!isAdmin) return;
 if(!appData.items[catId]) appData.items[catId] = [];
 appData.items[catId].push({ id: genId(), text: '', coverText: '', videoUrl: '' });
 saveData(); renderContent(); toast('道具已添加');
}

function deleteItem(itemId){
 if(!isAdmin) return;
 var catIds = Object.keys(appData.items);
 for(var i=0;i<catIds.length;i++){
 var items = appData.items[catIds[i]];
 for(var j=0;j<items.length;j++){
 if(items[j].id===itemId){
 if(activeVideoCardId===itemId) stopActiveVideo();
 items.splice(j, 1);
 saveData(); renderContent(); toast('道具已删除');
 return;
 }
 }
 }
}

function updateItemText(itemId, newText){
 if(!isAdmin) return;
 var item = findItem(itemId);
 if(item){ item.text = newText; saveData(); }
}

function editVideoUrl(itemId){
 if(!isAdmin) return;
 var item = findItem(itemId);
 if(!item) return;
 var newUrl = prompt('输入视频直链（YouTube / mp4 / GitHub raw 链接）：', item.videoUrl||'');
 if(newUrl===null) return;
 if(activeVideoCardId===itemId) stopActiveVideo();
 item.videoUrl = newUrl.trim();
 saveData(); renderContent(); toast('视频链接已更新');
}

// ========== 数据导入导出 ==========
function exportData(){
 if(!isAdmin) return;
 var blob = new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
 var url = URL.createObjectURL(blob);
 var a = document.createElement('a');
 a.href = url; a.download = 'dust2-tactical-backup.json'; a.click();
 URL.revokeObjectURL(url);
 toast('数据已导出');
}

function importDataPrompt(){ if(!isAdmin) return; document.getElementById('importFileInput').click(); }

function handleImportFile(event){
 if(!isAdmin) return;
 var file = event.target.files[0];
 if(!file) return;
 var reader = new FileReader();
 reader.onload = function(e){
 try{
 var imported = JSON.parse(e.target.result);
 if(imported.categories&&imported.items){
 if(confirm('导入将覆盖当前所有数据，确定继续？')){
 appData = imported;
 activeCategoryId = appData.categories.length>0 ? appData.categories[0].id : null;
 activeVideoCardId = null;
 searchQuery = '';
 document.getElementById('searchInput').value = '';
 document.getElementById('searchClear').classList.remove('visible');
 saveData(); renderAll(); toast('数据已导入');
 }
 }else{ alert('无效的数据格式'); }
 }catch(err){ alert('JSON 解析失败'); }
 };
 reader.readAsText(file);
 event.target.value = '';
}

function resetAll(){
 if(!isAdmin) return;
 if(confirm('确定要重置所有数据？此操作不可恢复！')){
 appData = getDefaultData();
 activeCategoryId = appData.categories.length>0 ? appData.categories[0].id : null;
 activeVideoCardId = null;
 searchQuery = '';
 document.getElementById('searchInput').value = '';
 document.getElementById('searchClear').classList.remove('visible');
 saveData(); renderAll(); toast('已重置为默认数据');
 }
}

// ========== 工具函数 ==========
function escapeHtml(str){
 var div = document.createElement('div');
 div.textContent = str;
 return div.innerHTML;
}

function escapeAttr(str){
 return str.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg){
 var existing = document.querySelector('.toast');
 if(existing) existing.remove();
 var el = document.createElement('div');
 el.className = 'toast';
 el.textContent = msg;
 document.body.appendChild(el);
 setTimeout(function(){ el.remove(); }, 2200);
}

// ========== 初始化 ==========
if(appData.categories.length > 0 && !activeCategoryId) activeCategoryId = appData.categories[0].id;
renderAll();
applyAdminMode();
