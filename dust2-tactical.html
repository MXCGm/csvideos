<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dustⅡ 道具 · 战术面板</title>
<style>
/* ========== RESET & FONTS ========== */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg-deep: #14140e;
  --bg-panel: rgba(196,176,140,0.06);
  --bg-card: rgba(28,26,20,0.9);
  --tactical-orange: #f0a050;
  --tactical-orange-dim: rgba(240,160,80,0.15);
  --text-primary: #e0ddd4;
  --text-dim: #8a8578;
  --border-subtle: rgba(196,176,140,0.15);
  --border-active: rgba(240,160,80,0.6);
  --military-green: #5c6b4e;
  --danger-red: #c0392b;
  --danger-bg: rgba(192,57,43,0.15);
  --font-title: 'Bebas Neue', 'Impact', 'Arial Black', sans-serif;
  --font-mono: 'Share Tech Mono', 'Courier New', monospace;
  --gap: 12px;
  --card-size: 240px;
}

body{
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 背景扫描线 */
body::before{
  content: '';
  position: fixed;
  top: 0;left: 0;right: 0;height: 2px;
  background: rgba(240,160,80,0.04);
  animation: scanline 8s linear infinite;
  pointer-events: none;
  z-index: 9999;
}
@keyframes scanline{
  0%{top:0%}
  100%{top:100%}
}

/* 网格纹理 */
body::after{
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(196,176,140,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,176,140,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ========== LAYOUT ========== */
.app-container{
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 32px 40px;
}

/* ========== HEADER ========== */
.header{
  display: flex;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.title-block{
  line-height: 0.9;
}
.title-label{
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--tactical-orange);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.title-main{
  font-family: var(--font-title);
  font-size: 72px;
  letter-spacing: -1px;
  color: var(--text-primary);
  text-transform: uppercase;
}
.title-main span{
  color: var(--tactical-orange);
}
.title-coords{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-top: 4px;
  padding-left: 2px;
  border-left: 2px solid var(--tactical-orange);
  padding: 2px 0 2px 8px;
}

/* 全局操作按钮 */
.global-actions{
  margin-left: auto;
  display: flex;
  gap: 10px;
  align-self: flex-end;
}
.btn-global{
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-dim);
  padding: 8px 16px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-global:hover{
  border-color: var(--tactical-orange);
  color: var(--tactical-orange);
  background: var(--tactical-orange-dim);
}

/* ========== 分类横向栏 (Tab Bar) ========== */
.category-bar-wrap{
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border-subtle);
  padding-bottom: 10px;
}
.category-tab{
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 1px;
  transition: all 0.25s;
  white-space: nowrap;
  user-select: none;
}
.category-tab:hover{
  color: var(--text-primary);
  background: var(--bg-panel);
  border-color: var(--border-subtle);
}
.category-tab.active{
  color: var(--tactical-orange);
  background: var(--tactical-orange-dim);
  border-color: var(--border-active);
}
.category-tab.active::after{
  content: '';
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  background: var(--tactical-orange);
  border-radius: 50%;
}

/* 分类标签的操作按钮 */
.cat-actions-inline{
  display: flex;
  gap: 2px;
  margin-left: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.category-tab:hover .cat-actions-inline,
.category-tab.active .cat-actions-inline{
  opacity: 1;
}
.cat-btn-mini{
  width: 20px;height: 20px;
  display: flex;align-items: center;justify-content: center;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  line-height: 1;
  border-radius: 2px;
  transition: all 0.2s;
}
.cat-btn-mini:hover{
  border-color: var(--tactical-orange);
  color: var(--tactical-orange);
}
.cat-btn-mini.danger:hover{
  border-color: var(--danger-red);
  color: var(--danger-red);
}

/* 添加分类按钮 */
.category-add{
  padding: 8px 14px;
  background: transparent;
  border: 1px dashed var(--border-subtle);
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 18px;
  line-height: 1;
  transition: all 0.2s;
  min-width: 38px;
  text-align: center;
}
.category-add:hover{
  border-color: var(--tactical-orange);
  color: var(--tactical-orange);
  background: var(--tactical-orange-dim);
}

/* ========== 内容区域 ========== */
.content-area{
  min-height: 400px;
}

/* 空状态 */
.empty-state{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  color: var(--text-dim);
  border: 1px dashed var(--border-subtle);
  text-align: center;
}
.empty-state .empty-icon{
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state p{
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 1px;
}

/* 卡片网格 */
.cards-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr));
  gap: var(--gap);
  align-items: start;
}

/* ========== 单个卡片 ========== */
.card{
  position: relative;
  aspect-ratio: 1 / 1;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.25s, box-shadow 0.25s;
  cursor: default;
}
.card:hover{
  border-color: var(--tactical-orange);
  box-shadow: inset 0 0 40px rgba(240,160,80,0.05), 0 0 20px rgba(240,160,80,0.08);
}

/* 卡片角落标记 */
.card::before{
  content: '';
  position: absolute;
  top: 6px;right: 6px;
  width: 8px;height: 8px;
  border-top: 1px solid var(--border-subtle);
  border-right: 1px solid var(--border-subtle);
  pointer-events: none;
  opacity: 0.6;
}
.card:hover::before{
  border-color: var(--tactical-orange);
}

/* 卡片文字区域 */
.card-text-area{
  position: relative;
  padding: 10px 12px;
  background: rgba(20,20,14,0.7);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.card-text-input{
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  outline: none;
  min-width: 0;
}
.card-text-input::placeholder{
  color: var(--text-dim);
  opacity: 0.5;
}
.card-text-input:focus{
  border-bottom: 1px solid var(--tactical-orange);
}

/* 卡片内操作按钮 */
.card-btn-row{
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.card-btn{
  width: 22px;height: 22px;
  display: flex;align-items: center;justify-content: center;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  border-radius: 2px;
  transition: all 0.2s;
}
.card-btn:hover{
  border-color: var(--tactical-orange);
  color: var(--tactical-orange);
}
.card-btn.danger:hover{
  border-color: var(--danger-red);
  color: var(--danger-red);
}

/* 视频区域 */
.card-video-area{
  flex: 1;
  position: relative;
  background: #0a0a06;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}
.card-video-area iframe,
.card-video-area video{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
.video-placeholder{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-align: center;
  padding: 12px;
  cursor: pointer;
  transition: color 0.2s;
}
.video-placeholder:hover{
  color: var(--tactical-orange);
}
.video-placeholder .play-icon{
  display: block;
  font-size: 36px;
  margin-bottom: 8px;
  opacity: 0.4;
}

/* ========== MODAL ========== */
.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(10,10,6,0.85);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
.modal-box{
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  padding: 28px;
  width: 440px;
  max-width: 90vw;
  position: relative;
}
.modal-box h3{
  font-family: var(--font-title);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--tactical-orange);
  margin-bottom: 20px;
  text-transform: uppercase;
}
.modal-box label{
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.modal-box input{
  width: 100%;
  background: rgba(20,20,14,0.6);
  border: 1px solid var(--border-subtle);
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.modal-box input:focus{
  border-color: var(--tactical-orange);
}
.modal-actions{
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 4px;
}
.modal-actions button{
  padding: 10px 20px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.modal-actions button:hover{
  border-color: var(--tactical-orange);
  color: var(--tactical-orange);
}
.modal-actions button.confirm{
  border-color: var(--tactical-orange);
  background: var(--tactical-orange-dim);
  color: var(--tactical-orange);
}
.modal-actions button.confirm:hover{
  background: rgba(240,160,80,0.25);
}
.modal-close{
  position: absolute;
  top: 12px;right: 16px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 20px;
  transition: color 0.2s;
}
.modal-close:hover{color:var(--danger-red)}

/* ========== 通知提示 ========== */
.toast{
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-card);
  border: 1px solid var(--tactical-orange);
  padding: 12px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--tactical-orange);
  letter-spacing: 1px;
  z-index: 20000;
  animation: toastIn 0.3s ease-out, toastOut 0.3s 1.7s ease-in forwards;
  pointer-events: none;
}
@keyframes toastIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes toastOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(20px)}
}

/* ========== 响应式 ========== */
@media(max-width:768px){
  .app-container{padding:16px}
  .title-main{font-size:44px}
  .cards-grid{
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
  :root{--card-size:160px}
}
</style>
</head>
<body>

<div class="app-container">
  <!-- 头部 -->
  <header class="header">
    <div class="title-block">
      <div class="title-label">Tactical Equipment</div>
      <div class="title-main">dust<span>Ⅱ</span> 道具</div>
      <div class="title-coords">POS: A_LONG · CAT · B_TUNNELS</div>
    </div>
    <div class="global-actions">
      <button class="btn-global" onclick="exportData()" title="导出数据">⟳ 导出 JSON</button>
      <button class="btn-global" onclick="importDataPrompt()" title="导入数据">↓ 导入 JSON</button>
      <button class="btn-global" onclick="resetAll()" title="重置全部数据">⚠ 重置</button>
    </div>
  </header>

  <!-- 分类横向栏 -->
  <div class="category-bar-wrap" id="categoryBar">
    <!-- JS 动态渲染 -->
  </div>

  <!-- 内容区 -->
  <div class="content-area" id="contentArea">
    <!-- JS 动态渲染 -->
  </div>
</div>

<!-- 隐藏的文件导入 input -->
<input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">

<script>
// ========== 数据模型 ==========
// 结构: { categories: [{ id, name }, ...], items: { categoryId: [{ id, text, videoUrl }, ...] } }

const STORAGE_KEY = 'dust2_tactical_data';
let appData = loadData();
let activeCategoryId = null;

function getDefaultData(){
  return {
    categories: [
      { id: genId(), name: 'A 大道' },
      { id: genId(), name: 'A 小道' },
      { id: genId(), name: '中门' },
      { id: genId(), name: 'B 洞' },
      { id: genId(), name: 'B 包点' },
    ],
    items: {}
  };
}

function genId(){
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d.categories && d.items) return d;
    }
  }catch(e){}
  return getDefaultData();
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

// ========== 渲染 ==========
function renderAll(){
  renderCategoryBar();
  renderContent();
}

function renderCategoryBar(){
  const bar = document.getElementById('categoryBar');
  let html = '';
  appData.categories.forEach(cat => {
    const isActive = cat.id === activeCategoryId;
    html += `
      <div class="category-tab${isActive ? ' active' : ''}" data-cat-id="${cat.id}" onclick="switchCategory('${cat.id}')">
        <span class="cat-name" data-cat-id="${cat.id}">${escapeHtml(cat.name)}</span>
        <span class="cat-actions-inline">
          <button class="cat-btn-mini" onclick="event.stopPropagation();renameCategory('${cat.id}')" title="重命名">✎</button>
          <button class="cat-btn-mini danger" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="删除">×</button>
        </span>
      </div>
    `;
  });
  html += `<button class="category-add" onclick="addCategory()" title="添加分类">+</button>`;
  bar.innerHTML = html;
}

function renderContent(){
  const area = document.getElementById('contentArea');
  if(!activeCategoryId){
    // 默认选中第一个
    if(appData.categories.length > 0){
      activeCategoryId = appData.categories[0].id;
      renderAll();
      return;
    }
    area.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">☐</span>
        <p>未创建分类 · 点击上方 [+] 添加</p>
      </div>
    `;
    return;
  }
  const items = appData.items[activeCategoryId] || [];
  if(items.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">▸</span>
        <p>此分类下暂无道具 · 点击下方按钮添加</p>
      </div>
    `;
  }else{
    let cardsHtml = '';
    items.forEach(item => {
      cardsHtml += renderCard(item);
    });
    area.innerHTML = `<div class="cards-grid">${cardsHtml}</div>`;
  }

  // 每个分类底部加一个"添加道具"按钮
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-global';
  addBtn.style.cssText = 'margin-top:16px;width:100%;text-align:center;';
  addBtn.textContent = '+ 添加道具';
  addBtn.onclick = () => addItem(activeCategoryId);
  area.appendChild(addBtn);
}

function renderCard(item){
  const hasVideo = item.videoUrl && item.videoUrl.trim() !== '';
  let videoInner = '';
  if(hasVideo){
    // 判断是否为 YouTube / 可嵌入链接
    const embedHtml = getEmbedHtml(item.videoUrl);
    if(embedHtml){
      videoInner = embedHtml;
    }else{
      videoInner = `<video src="${escapeAttr(item.videoUrl)}" controls playsinline></video>`;
    }
  }else{
    videoInner = `
      <div class="video-placeholder" onclick="editVideoUrl('${item.id}')">
        <span class="play-icon">▶</span>
        点击添加视频链接
      </div>
    `;
  }
  return `
    <div class="card" data-item-id="${item.id}">
      <div class="card-text-area">
        <input class="card-text-input" 
               value="${escapeAttr(item.text || '')}" 
               placeholder="道具名称..."
               onchange="updateItemText('${item.id}', this.value)"
               onclick="event.stopPropagation()">
        <div class="card-btn-row">
          <button class="card-btn" onclick="editVideoUrl('${item.id}')" title="编辑视频">▶</button>
          <button class="card-btn danger" onclick="deleteItem('${item.id}')" title="删除">×</button>
        </div>
      </div>
      <div class="card-video-area">
        ${videoInner}
      </div>
    </div>
  `;
}

function getEmbedHtml(url){
  // 支持 YouTube embed
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if(ytMatch){
    return `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen loading="lazy"></iframe>`;
  }
  // 其他直链 mp4 等交给 video 标签处理
  if(url.match(/\.(mp4|webm|ogg)(\?|$)/i)){
    return null; // 用 video 标签
  }
  // 其他尝试 iframe（如 GitHub 直链可能也是 mp4）
  return null;
}

// ========== 分类操作 ==========
function switchCategory(catId){
  activeCategoryId = catId;
  renderAll();
}

function addCategory(){
  const name = prompt('输入分类名称：');
  if(!name || name.trim() === '') return;
  const newCat = { id: genId(), name: name.trim() };
  appData.categories.push(newCat);
  appData.items[newCat.id] = [];
  activeCategoryId = newCat.id;
  saveData();
  renderAll();
  toast('分类已添加');
}

function renameCategory(catId){
  const cat = appData.categories.find(c => c.id === catId);
  if(!cat) return;
  const newName = prompt('重命名分类：', cat.name);
  if(newName && newName.trim() !== ''){
    cat.name = newName.trim();
    saveData();
    renderAll();
    toast('已重命名');
  }
}

function deleteCategory(catId){
  const cat = appData.categories.find(c => c.id === catId);
  if(!cat) return;
  if(!confirm(`确定删除分类「${cat.name}」及其所有道具？此操作不可恢复。`)) return;
  appData.categories = appData.categories.filter(c => c.id !== catId);
  delete appData.items[catId];
  if(activeCategoryId === catId){
    activeCategoryId = appData.categories.length > 0 ? appData.categories[0].id : null;
  }
  saveData();
  renderAll();
  toast('分类已删除');
}

// ========== 道具操作 ==========
function addItem(catId){
  if(!appData.items[catId]) appData.items[catId] = [];
  const newItem = { id: genId(), text: '', videoUrl: '' };
  appData.items[catId].push(newItem);
  saveData();
  renderContent();
  toast('道具已添加');
}

function deleteItem(itemId){
  for(const catId of Object.keys(appData.items)){
    const idx = appData.items[catId].findIndex(i => i.id === itemId);
    if(idx !== -1){
      appData.items[catId].splice(idx, 1);
      saveData();
      renderContent();
      toast('道具已删除');
      return;
    }
  }
}

function updateItemText(itemId, newText){
  for(const catId of Object.keys(appData.items)){
    const item = appData.items[catId].find(i => i.id === itemId);
    if(item){
      item.text = newText;
      saveData();
      return;
    }
  }
}

function editVideoUrl(itemId){
  let currentUrl = '';
  for(const catId of Object.keys(appData.items)){
    const item = appData.items[catId].find(i => i.id === itemId);
    if(item){ currentUrl = item.videoUrl || ''; break; }
  }
  const newUrl = prompt('输入视频直链（YouTube / mp4 / GitHub raw 链接）：', currentUrl);
  if(newUrl === null) return; // 取消
  for(const catId of Object.keys(appData.items)){
    const item = appData.items[catId].find(i => i.id === itemId);
    if(item){
      item.videoUrl = newUrl.trim();
      saveData();
      renderContent();
      toast('视频链接已更新');
      return;
    }
  }
}

// ========== 数据导入导出 ==========
function exportData(){
  const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dust2-tactical-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('数据已导出');
}

function importDataPrompt(){
  document.getElementById('importFileInput').click();
}

function handleImportFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const imported = JSON.parse(e.target.result);
      if(imported.categories && imported.items){
        if(confirm('导入将覆盖当前所有数据，确定继续？')){
          appData = imported;
          activeCategoryId = appData.categories.length > 0 ? appData.categories[0].id : null;
          saveData();
          renderAll();
          toast('数据已导入');
        }
      }else{
        alert('无效的数据格式');
      }
    }catch(err){
      alert('JSON 解析失败');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll(){
  if(confirm('⚠ 确定要重置所有数据？此操作不可恢复！')){
    appData = getDefaultData();
    activeCategoryId = appData.categories.length > 0 ? appData.categories[0].id : null;
    saveData();
    renderAll();
    toast('已重置为默认数据');
  }
}

// ========== 工具函数 ==========
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str){
  return str.replace(/"/g, '&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// ========== 初始化 ==========
if(appData.categories.length > 0 && !activeCategoryId){
  activeCategoryId = appData.categories[0].id;
}
renderAll();
